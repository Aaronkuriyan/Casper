<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JARVIS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 820px;
      background: #151518;
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      overflow: hidden;
    }
    #header {
      padding: 14px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1c1c21;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #header-name { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
    #header-status { margin-left: auto; font-size: 12px; color: #9898aa; }
    #memory-bar {
      padding: 6px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: #55556a;
    }
    #mem-display { color: #9898aa; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
    }
    .bot .avatar { background: rgba(79,142,247,0.15); color: #4f8ef7; border: 0.5px solid rgba(79,142,247,0.3); }
    .user .avatar { background: #1c1c21; color: #9898aa; border: 0.5px solid rgba(255,255,255,0.12); }
    .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; max-width: 78%; }
    .msg.user .bubble { background: rgba(79,142,247,0.12); color: #4f8ef7; border: 0.5px solid rgba(79,142,247,0.2); border-bottom-right-radius: 4px; }
    .msg.bot .bubble { background: #1c1c21; color: #e8e8f0; border: 0.5px solid rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
    .typing { display: flex; gap: 5px; padding: 4px 0; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: #55556a; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    #voice-bar {
      padding: 16px 20px;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      background: #1c1c21;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    #mic-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 0.5px solid rgba(255,255,255,0.14);
      background: #151518;
      color: #9898aa;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #mic-btn:hover { background: #0d0d0f; color: #e8e8f0; }
    #mic-btn.listening { border-color: #ef4444; background: rgba(239,68,68,0.1); color: #ef4444; animation: ring 1s infinite; }
    #mic-btn.speaking { border-color: #4f8ef7; background: rgba(79,142,247,0.1); color: #4f8ef7; }
    @keyframes ring { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 12px rgba(239,68,68,0)} }
    #transcript-preview { font-size: 13px; color: #9898aa; font-style: italic; text-align: center; min-height: 18px; }
    #voice-status { font-size: 12px; color: #55556a; min-height: 18px; }
    #input-row { display: flex; gap: 8px; width: 100%; }
    #text-input {
      flex: 1;
      background: #151518;
      border: 0.5px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 13px;
      color: #e8e8f0;
      font-family: inherit;
      outline: none;
    }
    #text-input::placeholder { color: #55556a; }
    #text-input:focus { border-color: rgba(79,142,247,0.4); }
    #send-btn {
      padding: 9px 16px;
      border-radius: 8px;
      border: 0.5px solid rgba(255,255,255,0.14);
      background: #151518;
      color: #9898aa;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    #send-btn:hover { background: #0d0d0f; color: #e8e8f0; }
    #voice-toggle { font-size: 11px; color: #55556a; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="status-dot"></div>
      <span id="header-name">JARVIS</span>
      <span id="header-status">Online</span>
    </div>
    <div id="memory-bar">Memory: <span id="mem-display">Learning about you...</span></div>
    <div id="messages">
      <div class="msg bot">
        <div class="avatar">J</div>
        <div class="bubble">Good day. JARVIS online. Press the microphone and speak — I'll listen and respond. You can also type below.</div>
      </div>
    </div>
    <div id="voice-bar">
      <button id="mic-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
          <line x1="9" y1="21" x2="15" y2="21"/>
        </svg>
      </button>
      <div id="transcript-preview"></div>
      <div id="voice-status">Tap mic to speak</div>
      <div id="input-row">
        <input id="text-input" type="text" placeholder="Or type here..." />
        <button id="send-btn">Send</button>
      </div>
      <span id="voice-toggle">Voice reply: ON</span>
    </div>
  </div>
  <script>
    const BACKEND_URL = "http://localhost:8000";
    let history = [], memory = [], voiceReply = true, recognition = null, isSpeaking = false;
    const synth = window.speechSynthesis;
    const messagesEl = document.getElementById("messages");
    const micBtn = document.getElementById("mic-btn");
    const voiceStatus = document.getElementById("voice-status");
    const transcriptEl = document.getElementById("transcript-preview");
    const textInput = document.getElementById("text-input");
    const sendBtn = document.getElementById("send-btn");
    const voiceToggle = document.getElementById("voice-toggle");
    const headerStatus = document.getElementById("header-status");
    const memDisplay = document.getElementById("mem-display");

    voiceToggle.addEventListener("click", () => {
      voiceReply = !voiceReply;
      voiceToggle.textContent = "Voice reply: " + (voiceReply ? "ON" : "OFF");
      if (!voiceReply) synth.cancel();
    });

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = role === "bot" ? "J" : "U";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      div.appendChild(av);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg bot";
      div.id = "typing-msg";
      div.innerHTML = '<div class="avatar">J</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() { document.getElementById("typing-msg")?.remove(); }

    function updateMemory(text) {
      const nameMatch = text.match(/(?:my name is|i'm|call me|i am)\s+([A-Z][a-z]+)/i);
      if (nameMatch && !memory.find(m => m.startsWith("Name"))) memory.push("Name: " + nameMatch[1]);
      if (/i (?:like|love|enjoy|prefer)\s+(.+)/i.test(text)) memory.push("Preference noted");
      if (memory.length) memDisplay.textContent = memory.slice(-4).join(" · ");
    }

    function speak(text) {
      if (!voiceReply || !synth) return;
      synth.cancel();
      const utt = new SpeechSynthesisUtterance(text.replace(/[*_`#]/g, ""));
      utt.rate = 0.95; utt.pitch = 0.85; utt.volume = 1;
      const voices = synth.getVoices();
      const preferred = voices.find(v => v.name.includes("Google UK English Male"))
        || voices.find(v => v.name.includes("Daniel"))
        || voices.find(v => v.lang === "en-GB")
        || voices.find(v => v.lang.startsWith("en"));
      if (preferred) utt.voice = preferred;
      utt.onstart = () => { micBtn.classList.add("speaking"); headerStatus.textContent = "Speaking..."; isSpeaking = true; };
      utt.onend = () => { micBtn.classList.remove("speaking"); headerStatus.textContent = "Online"; voiceStatus.textContent = "Tap mic to speak"; isSpeaking = false; };
      synth.speak(utt);
    }

    async function sendToJarvis(userText) {
      if (!userText.trim()) return;
      synth.cancel();
      addMessage("user", userText);
      updateMemory(userText);
      history.push({ role: "user", content: userText });
      voiceStatus.textContent = "Thinking...";
      headerStatus.textContent = "Thinking...";
      showTyping();
      try {
        const res = await fetch(BACKEND_URL + "/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userText, history, memory })
        });
        const data = await res.json();
        const reply = data.reply || "I encountered an issue. Please try again.";
        history.push({ role: "assistant", content: reply });
        hideTyping();
        addMessage("bot", reply);
        speak(reply);
      } catch(e) {
        hideTyping();
        addMessage("bot", "Cannot reach backend. Make sure the server is running on port 8000.");
        headerStatus.textContent = "Error";
      }
    }

    function startListening() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { voiceStatus.textContent = "Voice not supported — use Chrome or Edge."; return; }
      synth.cancel();
      recognition = new SR();
      recognition.lang = "en-US";
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.onstart = () => { micBtn.classList.add("listening"); voiceStatus.textContent = "Listening..."; headerStatus.textContent = "Listening..."; transcriptEl.textContent = ""; };
      recognition.onresult = (e) => {
        let interim = "", final = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        transcriptEl.textContent = final || interim;
        if (final) { recognition.stop(); transcriptEl.textContent = ""; sendToJarvis(final.trim()); }
      };
      recognition.onerror = (e) => {
        micBtn.classList.remove("listening"); headerStatus.textContent = "Online"; transcriptEl.textContent = "";
        voiceStatus.textContent = e.error === "not-allowed" ? "Microphone access denied." : "Could not hear you. Try again.";
      };
      recognition.onend = () => { micBtn.classList.remove("listening"); recognition = null; if (!isSpeaking) headerStatus.textContent = "Online"; };
      recognition.start();
    }

    micBtn.addEventListener("click", () => {
      if (recognition) { try { recognition.stop(); } catch(_){} recognition = null; return; }
      startListening();
    });
    sendBtn.addEventListener("click", () => { const t = textInput.value.trim(); if (t) { textInput.value = ""; sendToJarvis(t); } });
    textInput.addEventListener("keydown", e => { if (e.key === "Enter") { const t = textInput.value.trim(); if (t) { textInput.value = ""; sendToJarvis(t); } } });
    if (synth?.onvoiceschanged !== undefined) synth.onvoiceschanged = () => synth.getVoices();
  </script>
</body>
</html>
